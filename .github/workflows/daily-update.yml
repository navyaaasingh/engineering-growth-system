name: Daily Engineering Update

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate random commits
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # FIRST sync repository
          git pull --rebase origin main

          # THEN modify files
          python scripts/update_log.py

          COMMITS=$((RANDOM % 9 + 2))
          echo "Creating $COMMITS commits"

          for i in $(seq 1 $COMMITS)
          do
            OFFSET=$((RANDOM % 86400))
            DATE=$(date -d "$OFFSET seconds ago" +"%Y-%m-%d %H:%M:%S")

            echo "Commit $i at $DATE" >> data/commit_log.txt

            git add .

            if ! git diff --cached --quiet; then
              GIT_AUTHOR_DATE="$DATE" GIT_COMMITTER_DATE="$DATE" \
              git commit -m "Automated random commit $i"
            fi
          done

          git push origin main